<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercícios de JavaScript</title>
    <style>
        section { margin-bottom: 30px; padding: 15px; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <h1>Roteiro III</h1>

    <section>
        <h2>Exercício 1: Mensagem ao clicar</h2>
        <button id="btn-ex1">Mostrar Alerta</button>
    </section>

    <section>
        <h2 id="titulo-ex2">Título Original</h2>
        <button id="btn-ex2">Alterar Título</button>
    </section>

    <section>
        <h2>Exercício 3: Alterar cor da página</h2>
        <button id="btn-ex3">Mudar Cor de Fundo</button>
    </section>

    <section>
        <h2>Exercício 4: Contador</h2>
        <p id="texto-contador">Contador: 0</p>
        <button id="btn-ex4">Somar 1</button>
    </section>

    <section>
        <h2>Exercício 5: Mostrar e esconder texto</h2>
        <button id="btn-ex5">Mostrar/Esconder</button>
        <p id="paragrafo-ex5">Este texto vai aparecer e sumir!</p>
    </section>

    <section>
        <h2>Exercício 6: Modo Claro/Escuro</h2>
        <button id="btn-ex6">Alternar Tema</button>
    </section>

    <script src="script.js"></script>
</body>
</html>
